name: Release
run-name: Release ${{ github.ref_name }}

# Creates GitHub Release binaries for ax upgrade + install.ps1/install.sh.
# Publishes all six platforms (Windows, macOS, Linux/WSL2) — partial releases fail verify step.
# Trigger: push tag v* or manual workflow_dispatch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Required for manual runs."
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.bundle }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: win32-x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            bundle: win32-arm64
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            bundle: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            bundle: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            bundle: darwin-arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            bundle: darwin-x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux cross toolchain (arm64)
        if: matrix.bundle == 'linux-arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build ax
        run: |
          cargo clean -p ax-cli
          cargo build --release -p ax-cli --target ${{ matrix.target }}

      - name: Package archive
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release.sh ${{ matrix.bundle }} ${{ matrix.target }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -Bundle ${{ matrix.bundle }} -RustTarget ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ax-${{ matrix.bundle }}
          path: dist/ax-${{ matrix.bundle }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ax-*
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No release tag. Push v* tag or set workflow input tag."
            exit 1
          fi

      - name: Verify all platform assets
        run: bash scripts/verify-release-assets.sh dist

      - name: SHA256SUMS
        run: |
          cd dist
          sha256sum ax-* > SHA256SUMS
          cat SHA256SUMS
          ls -la

      - name: Remove stale GitHub release (keep tag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Deleting stale release ${TAG} before re-upload..."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag=false
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            ## ax ${{ steps.tag.outputs.tag }}

            Native binaries for **install.ps1** / **install.sh** / `ax upgrade`.

            ### Platforms (all six required)
            - Windows x64 / arm64 — `irm https://getax.wenneker.io/install.ps1 | iex`
            - macOS Intel / Apple Silicon — `curl -fsSL https://getax.wenneker.io/install.sh | sh`
            - Linux / WSL2 — same `install.sh`

            Downloads resolve from GitHub Releases; getax.wenneker.io/releases/* redirects to GitHub.

            ### Policy engine
            - `policy.storage: "database"` in ax.json — SQLite source of truth, .mdc export only
            - `ax policy import` / `ax policy export`
          files: |
            dist/ax-darwin-arm64.tar.gz
            dist/ax-darwin-x64.tar.gz
            dist/ax-linux-arm64.tar.gz
            dist/ax-linux-x64.tar.gz
            dist/ax-win32-arm64.zip
            dist/ax-win32-x64.zip
            dist/SHA256SUMS

      - name: Verify GitHub release published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          for attempt in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" --json tagName,assets --jq '.assets | length' 2>/dev/null | grep -qE '^[6-9]|^[1-9][0-9]+$'; then
              echo "Release ${TAG} visible with assets (attempt ${attempt})"
              exit 0
            fi
            echo "Waiting for GitHub release metadata (attempt ${attempt}/30)..."
            sleep 5
          done
          echo "::error::Release ${TAG} not visible with assets after 150s"
          gh release list --repo "$REPO" --limit 5 || true
          exit 1

      - name: Verify GitHub download URL (smoke)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          URL="https://github.com/GaryWenneker/ax/releases/download/${TAG}/ax-linux-x64.tar.gz"
          for attempt in $(seq 1 30); do
            code="$(curl -sL -o /dev/null -w '%{http_code}' "$URL")"
            if [ "$code" = "200" ]; then
              echo "OK: $URL (attempt ${attempt})"
              exit 0
            fi
            echo "Waiting for GitHub CDN (HTTP ${code}), attempt ${attempt}/30..."
            sleep 5
          done
          echo "::error::GitHub asset not reachable after 150s: $URL"
          exit 1

      - name: Update site version pointer and install scripts
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "${TAG}" > site/public/releases/latest.txt
          cp install.sh install.ps1 site/public/

      - name: Deploy docs site to Netlify
        continue-on-error: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ] || [ -z "${NETLIFY_SITE_ID:-}" ]; then
            echo "Skipping Netlify deploy (set NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID repo secrets)."
            exit 0
          fi
          cd site
          npm ci
          npm run build
          npx netlify-cli deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --message="Release ${{ steps.tag.outputs.tag }} docs"
