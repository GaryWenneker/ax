name: Release

# Creates GitHub Release binaries for ax upgrade + install.ps1/install.sh.
# Trigger: push tag v* or manual workflow_dispatch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Required for manual runs."
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.bundle }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: win32-x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            bundle: win32-arm64
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            bundle: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            bundle: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            bundle: darwin-arm64
            target: aarch64-apple-darwin
          - os: macos-13
            bundle: darwin-x64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install Linux cross toolchain (arm64)
        if: matrix.bundle == 'linux-arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build ax
        run: cargo build --release -p ax-cli --target ${{ matrix.target }}

      - name: Package archive
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release.sh ${{ matrix.bundle }} ${{ matrix.target }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -Bundle ${{ matrix.bundle }} -RustTarget ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ax-${{ matrix.bundle }}
          path: dist/ax-${{ matrix.bundle }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ax-*
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No release tag. Push v* tag or set workflow input tag."
            exit 1
          fi

      - name: SHA256SUMS
        run: |
          cd dist
          sha256sum ax-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES="ax ${TAG} — native binaries for install.ps1 / install.sh / ax upgrade."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/ax-* dist/SHA256SUMS --clobber
          else
            gh release create "$TAG" dist/ax-* dist/SHA256SUMS --title "$TAG" --notes "$NOTES"
          fi

      - name: Stage public release mirror (getax.wenneker.io)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p "site/public/releases/${TAG}"
          cp dist/ax-* "site/public/releases/${TAG}/"
          cp dist/SHA256SUMS "site/public/releases/${TAG}/" || true
          echo "${TAG}" > site/public/releases/latest.txt
          cp install.sh install.ps1 site/public/

      - name: Deploy site + releases to Netlify
        if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          cd site
          npm ci
          npm run build
          npx netlify-cli deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --message="Release ${{ steps.tag.outputs.tag }}"
